<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さくとがズートピアの世界に</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ========== スクリーン共通 ========== */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* ========== タイトル画面 ========== */
    #titleScreen {
      background: linear-gradient(160deg, #1a1a4e 0%, #2d1b69 40%, #11998e 100%);
    }

    .title-city {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      padding: 0 20px;
    }

    .building {
      background: rgba(255,255,255,0.08);
      border-radius: 4px 4px 0 0;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .building::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      background: repeating-linear-gradient(
        transparent,
        transparent 10px,
        rgba(255,220,100,0.15) 10px,
        rgba(255,220,100,0.15) 12px
      );
    }

    .title-stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 200px;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; transform: scale(1); }
      to { opacity: 1; transform: scale(1.3); }
    }

    .title-content {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 40px;
    }

    .title-main {
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: white;
      font-weight: bold;
      text-shadow: 0 0 30px rgba(100,200,255,0.8), 0 4px 8px rgba(0,0,0,0.5);
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .title-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.1em;
    }

    .title-chars {
      font-size: 3.5rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .btn-start {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a4e;
      border: none;
      padding: 18px 60px;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,200,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(255,200,0,0.5); }
      50% { transform: scale(1.05); box-shadow: 0 12px 32px rgba(255,200,0,0.7); }
    }

    .btn-start:hover {
      transform: scale(1.1) !important;
      animation: none;
    }

    /* ========== ゲーム画面 ========== */
    #gameScreen {
      flex-direction: column;
      padding: 20px;
    }

    /* ズートピア背景 */
    .bg-zootopia {
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }

    /* Sing背景 */
    .bg-sing {
      background: linear-gradient(180deg, #1a0a00 0%, #4a1010 40%, #2d0000 100%);
    }

    .bg-sing::before {
      content: '';
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(255,220,100,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ヘッダー */
    .game-header {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .stage-badge {
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .stage-badge.zootopia {
      background: rgba(100,180,255,0.2);
      border: 1px solid rgba(100,180,255,0.4);
      color: #88ccff;
    }

    .stage-badge.sing {
      background: rgba(255,180,50,0.2);
      border: 1px solid rgba(255,180,50,0.4);
      color: #ffcc66;
    }

    .score-display {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
    }

    .score-display span {
      color: #ffd200;
      font-weight: bold;
      font-size: 1.2rem;
    }

    /* プログレスバー */
    .progress-wrap {
      width: 100%;
      max-width: 700px;
      margin-bottom: 16px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.6);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 14px;
      background: rgba(255,255,255,0.1);
      border-radius: 7px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 7px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, #11998e, #38ef7d);
    }

    .progress-fill.sing-fill {
      background: linear-gradient(90deg, #f7971e, #ffd200);
    }

    /* キャラクター解放バー */
    .unlock-bar {
      width: 100%;
      max-width: 700px;
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }

    .char-slot {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3);
      transition: all 0.4s;
      position: relative;
    }

    .char-slot.locked {
      filter: grayscale(1) brightness(0.3);
    }

    .char-slot.unlocked {
      border-color: #ffd200;
      background: rgba(255,210,0,0.15);
      box-shadow: 0 0 12px rgba(255,210,0,0.4);
    }

    .char-slot.active {
      border-color: #38ef7d;
      background: rgba(56,239,125,0.15);
      box-shadow: 0 0 16px rgba(56,239,125,0.5);
      animation: activeGlow 1.5s ease-in-out infinite;
    }

    @keyframes activeGlow {
      0%, 100% { box-shadow: 0 0 16px rgba(56,239,125,0.5); }
      50% { box-shadow: 0 0 28px rgba(56,239,125,0.8); }
    }

    .char-slot .unlock-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    /* キャラクターエリア */
    .character-area {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 16px;
    }

    .char-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .char-emoji {
      font-size: 5rem;
      animation: charBounce 0.5s ease;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    @keyframes charBounce {
      0% { transform: scale(0.5) translateY(20px); opacity: 0; }
      70% { transform: scale(1.1) translateY(-5px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .char-name {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      text-align: center;
    }

    /* セリフバブル */
    .speech-bubble {
      flex: 1;
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 16px 20px;
      position: relative;
      min-height: 80px;
      display: flex;
      align-items: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      left: -16px;
      bottom: 20px;
      border: 8px solid transparent;
      border-right-color: rgba(255,255,255,0.95);
    }

    .speech-bubble p {
      color: #2d3436;
      font-size: 1rem;
      line-height: 1.6;
      animation: fadeInText 0.3s ease;
    }

    @keyframes fadeInText {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 問題エリア */
    .problem-area {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .problem-text {
      font-size: clamp(2rem, 8vw, 3.5rem);
      color: white;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      letter-spacing: 0.1em;
    }

    .problem-text.correct-flash {
      animation: correctAnim 0.5s ease;
    }

    .problem-text.wrong-shake {
      animation: wrongAnim 0.4s ease;
    }

    @keyframes correctAnim {
      0% { color: white; }
      30% { color: #38ef7d; transform: scale(1.1); }
      100% { color: white; transform: scale(1); }
    }

    @keyframes wrongAnim {
      0%, 100% { transform: translateX(0); color: white; }
      20% { transform: translateX(-10px); color: #ff7675; }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .answer-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .answer-input {
      width: 100px;
      height: 60px;
      font-size: 2rem;
      text-align: center;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-family: inherit;
      font-weight: bold;
      outline: none;
      transition: border-color 0.2s;
    }

    .answer-input:focus {
      border-color: #ffd200;
      background: rgba(255,215,0,0.1);
    }

    .btn-answer {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-answer.zootopia-btn {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
    }

    .btn-answer.sing-btn {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e;
    }

    .btn-answer:hover { transform: translateY(-2px); }
    .btn-answer:active { transform: scale(0.97); }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 8px;
    }

    .num-btn {
      width: 64px;
      height: 52px;
      font-size: 1.3rem;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .num-btn:hover { background: rgba(255,255,255,0.2); }
    .num-btn:active { transform: scale(0.95); }

    .num-btn.del-btn { background: rgba(255,100,100,0.2); border-color: rgba(255,100,100,0.3); }
    .num-btn.ok-btn { background: rgba(100,255,150,0.2); border-color: rgba(100,255,150,0.3); font-size: 1rem; }

    /* ========== ステージクリア画面 ========== */
    #clearScreen {
      background: linear-gradient(135deg, #1a1a4e 0%, #302b63 100%);
    }

    .clear-content {
      text-align: center;
      z-index: 10;
    }

    .clear-emoji {
      font-size: 5rem;
      animation: celebrateBounce 0.6s ease;
    }

    @keyframes celebrateBounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .clear-title {
      font-size: 2.5rem;
      color: #ffd200;
      font-weight: bold;
      margin: 16px 0 8px;
      text-shadow: 0 0 20px rgba(255,210,0,0.6);
    }

    .clear-sub {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 32px;
      line-height: 1.8;
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      top: -20px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .btn-next {
      padding: 18px 60px;
      font-size: 1.3rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a4e;
      box-shadow: 0 8px 24px rgba(255,200,0,0.4);
      transition: transform 0.2s;
    }

    .btn-next:hover { transform: scale(1.05); }

    /* ========== ゲームクリア画面 ========== */
    #gameClearScreen {
      background: linear-gradient(160deg, #2d0000 0%, #4a1010 40%, #1a0a00 100%);
    }

    .game-clear-title {
      font-size: clamp(2rem, 6vw, 3rem);
      color: #ffd200;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 0 30px rgba(255,210,0,0.7);
      margin: 16px 0;
    }

    .all-chars {
      font-size: 2.5rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
    }

    .all-chars span {
      animation: popIn 0.4s ease backwards;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .btn-retry {
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-family: inherit;
      margin-top: 24px;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-retry:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

    /* キャラ解放アニメ */
    .unlock-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(0,0,0,0.85);
      border: 3px solid #ffd200;
      border-radius: 20px;
      padding: 32px 48px;
      text-align: center;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .unlock-popup.show { transform: translate(-50%, -50%) scale(1); }

    .unlock-popup .up-emoji { font-size: 4rem; }
    .unlock-popup .up-title { color: #ffd200; font-size: 1.2rem; font-weight: bold; margin: 12px 0 4px; }
    .unlock-popup .up-name { color: white; font-size: 1.5rem; font-weight: bold; }

    /* 答え合わせエフェクト */
    .result-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }

    .result-overlay.show-correct {
      animation: overlayCorrect 0.7s ease forwards;
      color: #38ef7d;
    }

    .result-overlay.show-wrong {
      animation: overlayWrong 0.7s ease forwards;
      color: #ff7675;
    }

    @keyframes overlayCorrect {
      0% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.2); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.1); }
    }

    @keyframes overlayWrong {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* レスポンシブ */
    @media (max-width: 600px) {
      .char-emoji { font-size: 3.5rem; }
      .speech-bubble p { font-size: 0.9rem; }
      .problem-text { font-size: 2.2rem; }
      .answer-input { width: 80px; height: 50px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<!-- ========== タイトル画面 ========== -->
<div class="screen" id="titleScreen">
  <div class="title-stars" id="titleStars"></div>
  <div class="title-city" id="titleCity"></div>
  <div class="title-content">
    <div class="title-chars">🐰🦊🐨🐷</div>
    <h1 class="title-main">さくとが<br>ズートピアの世界に</h1>
    <p class="title-sub">わりざんアドベンチャー</p>
    <br><br>
    <button class="btn-start" onclick="startGame()">▶ はじめる</button>
  </div>
</div>

<!-- ========== ゲーム画面 ========== -->
<div class="screen hidden" id="gameScreen">
  <div class="game-header">
    <div class="stage-badge" id="stageBadge">Stage 1: ズートピア</div>
    <div class="score-display">せいかい: <span id="scoreDisplay">0</span> / 20</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">クリアまで…</span>
      <span id="progressNum">0 / 20</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="unlock-bar" id="unlockBar"></div>

  <div class="character-area">
    <div class="char-display">
      <div class="char-emoji" id="charEmoji">🐰</div>
      <div class="char-name" id="charName">ジュディ・ホップス</div>
    </div>
    <div class="speech-bubble">
      <p id="speechText">やあ！ジュディよ。<br>ズートピアへようこそ！<br>割り算に挑戦してみて！</p>
    </div>
  </div>

  <div class="problem-area">
    <div class="problem-text" id="problemText">12 ÷ 3 = ?</div>
    <div class="answer-row">
      <input class="answer-input" id="answerInput" type="number" min="0" max="99" placeholder="？">
      <button class="btn-answer zootopia-btn" id="answerBtn" onclick="checkAnswer()">こたえる！</button>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="numpadInput('1')">1</button>
      <button class="num-btn" onclick="numpadInput('2')">2</button>
      <button class="num-btn" onclick="numpadInput('3')">3</button>
      <button class="num-btn" onclick="numpadInput('4')">4</button>
      <button class="num-btn" onclick="numpadInput('5')">5</button>
      <button class="num-btn" onclick="numpadInput('6')">6</button>
      <button class="num-btn" onclick="numpadInput('7')">7</button>
      <button class="num-btn" onclick="numpadInput('8')">8</button>
      <button class="num-btn" onclick="numpadInput('9')">9</button>
      <button class="num-btn del-btn" onclick="numpadInput('del')">⌫</button>
      <button class="num-btn" onclick="numpadInput('0')">0</button>
      <button class="num-btn ok-btn" onclick="checkAnswer()">OK</button>
    </div>
  </div>
</div>

<!-- ========== ステージクリア画面 ========== -->
<div class="screen hidden" id="clearScreen">
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="clear-content">
    <div class="clear-emoji" id="clearEmoji">🎉</div>
    <h2 class="clear-title" id="clearTitle">ズートピアクリア！</h2>
    <p class="clear-sub" id="clearSub">さくと、すごい！<br>全部の問題を解いたよ！<br>つぎはSingの世界へ！</p>
    <button class="btn-next" id="nextBtn" onclick="goNextStage()">つぎへ ▶</button>
  </div>
</div>

<!-- ========== ゲームクリア画面 ========== -->
<div class="screen hidden" id="gameClearScreen">
  <div class="confetti-container" id="confettiContainer2"></div>
  <div class="clear-content">
    <div class="all-chars" id="allCharsDisplay"></div>
    <h2 class="game-clear-title">🎊 全クリア！おめでとう！ 🎊</h2>
    <p style="color:rgba(255,255,255,0.85); text-align:center; font-size:1.1rem; line-height:2;">
      さくと、ふたつのステージを<br>ぜんぶクリアしたよ！<br>割り算マスター認定！🏆
    </p>
    <button class="btn-retry" onclick="resetGame()">もう一度あそぶ</button>
  </div>
</div>

<!-- キャラ解放ポップアップ -->
<div class="unlock-popup" id="unlockPopup">
  <div class="up-emoji" id="upEmoji">🦊</div>
  <div class="up-title">🌟 なかまが増えた！</div>
  <div class="up-name" id="upName">ニック・ワイルド</div>
</div>

<!-- 正誤エフェクト -->
<div class="result-overlay" id="resultOverlay"></div>

<script>
// ========== データ ==========
const ZOOTOPIA = [
  {

// ========== 状態 ==========
let state = {
  stage: 1,
  correctCount: 0,
  currentCharIndex: 0,
  currentAnswer: 0,
  locked: false
};

// ========== 問題生成 ==========
function generateProblem() {
  const divisor = Math.floor(Math.random() * 8) + 2;
  const quotient = Math.floor(Math.random() * 8) + 2;
  const dividend = divisor * quotient;
  state.currentAnswer = quotient;
  document.getElementById('problemText').textContent = `${dividend} ÷ ${divisor} = ？`;
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').focus();
}

// ========== キャラクター取得 ==========
function getChars() { return state.stage === 1 ? ZOOTOPIA : SING; }

function getCurrentChar() {
  const chars = getChars();
  let idx = 0;
  for (let i = 0; i < chars.length; i++) {
    if (chars[i].unlockAt <= state.correctCount) idx = i;
  }
  return { char: chars[idx], idx };
}

// ========== UI更新 ==========
function updateCharDisplay(char) {
  const emojiEl = document.getElementById('charEmoji');
  emojiEl.textContent = char.emoji;
  emojiEl.style.animation = 'none';
  setTimeout(() => emojiEl.style.animation = '', 10);
  document.getElementById('charName').textContent = char.name;
}

function speak(text) {
  const el = document.getElementById('speechText');
  el.innerHTML = text.replace(/\n/g, '<br>');
}

function updateProgress() {
  const pct = (state.correctCount / 20) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressNum').textContent = `${state.correctCount} / 20`;
  document.getElementById('scoreDisplay').textContent = state.correctCount;
}

function updateUnlockBar() {
  const chars = getChars().filter(c => c.unlockAt < 20);
  const bar = document.getElementById('unlockBar');
  bar.innerHTML = '';
  const { idx } = getCurrentChar();
  chars.forEach((c, i) => {
    const slot = document.createElement('div');
    slot.className = 'char-slot' + (i > idx ? ' locked' : i === idx ? ' active' : ' unlocked');
    slot.innerHTML = `${c.emoji}<span class="unlock-label">${i === 0 ? 'スタート' : i * 5 + '問'}</span>`;
    bar.appendChild(slot);
  });
}

function setStageTheme() {
  const gs = document.getElementById('gameScreen');
  const badge = document.getElementById('stageBadge');
  const btn = document.getElementById('answerBtn');
  const fill = document.getElementById('progressFill');
  if (state.stage === 1) {
    gs.className = 'screen bg-zootopia';
    badge.className = 'stage-badge zootopia';
    badge.textContent = 'Stage 1: ズートピア';
    btn.className = 'btn-answer zootopia-btn';
    fill.className = 'progress-fill';
  } else {
    gs.className = 'screen bg-sing';
    badge.className = 'stage-badge sing';
    badge.textContent = 'Stage 2: SING！';
    btn.className = 'btn-answer sing-btn';
    fill.className = 'progress-fill sing-fill';
  }
}

// ========== キャラ解放チェック ==========
function checkUnlock() {
  const chars = getChars();
  for (let i = 0; i < chars.length; i++) {
    if (chars[i].unlockAt === state.correctCount && chars[i].unlockAt > 0 && chars[i].unlockAt < 20) {
      showUnlockPopup(chars[i]);
      return true;
    }
  }
  return false;
}

function showUnlockPopup(char) {
  state.locked = true;
  const popup = document.getElementById('unlockPopup');
  document.getElementById('upEmoji').textContent = char.emoji;
  document.getElementById('upName').textContent = char.name;
  popup.classList.add('show');
  setTimeout(() => {
    popup.classList.remove('show');
    const { char: newChar } = getCurrentChar();
    updateCharDisplay(newChar);
    speak(newChar.intro);
    updateUnlockBar();
    state.locked = false;
    generateProblem();
  }, 2200);
}

// ========== 正誤エフェクト ==========
function showResult(correct) {
  const el = document.getElementById('resultOverlay');
  el.textContent = correct ? '⭕' : '❌';
  el.className = 'result-overlay ' + (correct ? 'show-correct' : 'show-wrong');
  setTimeout(() => el.className = 'result-overlay', 800);

  const pt = document.getElementById('problemText');
  pt.classList.remove('correct-flash', 'wrong-shake');
  setTimeout(() => pt.classList.add(correct ? 'correct-flash' : 'wrong-shake'), 10);
  setTimeout(() => pt.classList.remove('correct-flash', 'wrong-shake'), 600);
}

// ========== 答えチェック ==========
function checkAnswer() {
  if (state.locked) return;
  const input = document.getElementById('answerInput');
  const val = parseInt(input.value);
  if (isNaN(val)) { input.focus(); return; }

  const correct = val === state.currentAnswer;
  showResult(correct);

  const { char } = getCurrentChar();
  const messages = correct ? char.correct : char.wrong;
  speak(messages[Math.floor(Math.random() * messages.length)]);

  if (correct) {
    state.correctCount++;
    updateProgress();

    if (state.correctCount >= 20) {
      state.locked = true;
      setTimeout(showStageClear, 800);
      return;
    }

    if (checkUnlock()) return;
    updateUnlockBar();
  }

  setTimeout(() => {
    if (!state.locked) generateProblem();
  }, 1000);
}

// ========== ステージクリア ==========
function showStageClear() {
  showScreen('clearScreen');
  launchConfetti('confettiContainer');

  if (state.stage === 1) {
    document.getElementById('clearEmoji').textContent = '🎉';
    document.getElementById('clearTitle').textContent = 'ズートピアクリア！';
    document.getElementById('clearSub').innerHTML =
      'さくと、やったね！<br>ズートピアの仲間たちが喜んでるよ！<br>次はSingの世界へ出発だ！';
    document.getElementById('nextBtn').textContent = 'Singの世界へ ▶';
  } else {
    showGameClear();
  }
}

function goNextStage() {
  state.stage = 2;
  state.correctCount = 0;
  state.locked = false;
  setStageTheme();
  updateProgress();
  updateUnlockBar();
  const char = SING[0];
  updateCharDisplay(char);
  speak(char.intro);
  generateProblem();
  showScreen('gameScreen');
}

// ========== ゲームクリア ==========
function showGameClear() {
  showScreen('gameClearScreen');
  launchConfetti('confettiContainer2');
  const allChars = [...ZOOTOPIA.filter(c => c.unlockAt < 20), ...SING.filter(c => c.unlockAt <= 20)];
  const el = document.getElementById('allCharsDisplay');
  el.innerHTML = '';
  allChars.forEach((c, i) => {
    const span = document.createElement('span');
    span.textContent = c.emoji;
    span.style.animationDelay = (i * 0.1) + 's';
    el.appendChild(span);
  });
}

// ========== リセット ==========
function resetGame() {
  state = { stage: 1, correctCount: 0, currentCharIndex: 0, currentAnswer: 0, locked: false };
  startGame();
}

// ========== ゲーム開始 ==========
function startGame() {
  setStageTheme();
  updateProgress();
  updateUnlockBar();
  const char = ZOOTOPIA[0];
  updateCharDisplay(char);
  speak(char.intro);
  generateProblem();
  showScreen('gameScreen');
}

// ========== 画面切り替え ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ========== 数字パッド ==========
function numpadInput(val) {
  const input = document.getElementById('answerInput');
  if (val === 'del') {
    input.value = input.value.slice(0, -1);
  } else {
    if (input.value.length < 2) input.value += val;
  }
  input.focus();
}

// ========== タイトル装飾 ==========
function buildTitle() {
  // 星
  const starsEl = document.getElementById('titleStars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      top:${Math.random() * 100}%;
      animation-delay:${Math.random() * 3}s;
      animation-duration:${1.5 + Math.random() * 2}s;
    `;
    starsEl.appendChild(s);
  }

  // ビル
  const city = document.getElementById('titleCity');
  const widths = [30, 45, 25, 55, 35, 40, 28, 50, 38, 42, 30, 60, 25, 45];
  const heights = [120, 160, 90, 180, 110, 150, 80, 170, 130, 140, 100, 190, 85, 155];
  widths.forEach((w, i) => {
    const b = document.createElement('div');
    b.className = 'building';
    b.style.cssText = `width:${w}px; height:${heights[i]}px;`;
    city.appendChild(b);
  });
}

// ========== 紙吹雪 ==========
function launchConfetti(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  const colors = ['#ff6b6b','#ffd200','#38ef7d','#74b9ff','#fd79a8','#a29bfe','#00cec9'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random() * 100}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      width:${6 + Math.random() * 8}px;
      height:${6 + Math.random() * 8}px;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration:${2 + Math.random() * 2}s;
      animation-delay:${Math.random() * 1.5}s;
    `;
    container.appendChild(p);
  }
}

// ========== Enterキー ==========
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});

// ========== 初期化 ==========
buildTitle();
